<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rein Mirror - Receiver</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #trackpad {
            touch-action: none;
            user-select: none;
        }
    </style>
</head>

<body class="receiver-view">
    <div id="status">Waiting for signal...</div>

    <div id="remote-container">
        <video id="remoteVideo" autoplay muted playsinline></video>
        <div id="overlay">Mirror Active</div>
    </div>

    <div id="trackpad">
        TRACKPAD (1: move/tap | 2: scroll/zoom | 3: gesture)
    </div>

    <script src="WebRTCManager.js"></script>
    <script>
        const videoElem = document.getElementById('remoteVideo');
        const statusLabel = document.getElementById('status');
        const overlay = document.getElementById('overlay');
        const trackpad = document.getElementById('trackpad');

        const roomId = "rein-gsoc-test";
        const rtc = new WebRTCManager('receiver', roomId, (stream) => {
            videoElem.srcObject = stream;
            videoElem.play().catch(() => {
                statusLabel.innerText = "Tap to view stream";
            });
            overlay.style.display = "block";
            statusLabel.innerText = "Connected";
        });

        rtc.onStatusUpdate = (msg) => { statusLabel.innerText = msg; };
        rtc.onConnectionStateChange = (state) => { statusLabel.innerText = "Connection: " + state; };

        let lastX = 0, lastY = 0;
        let lastDist = 0;
        let hasMoved = false;
        let moveThreshold = 5;
        let totalMoved = 0;

        trackpad.addEventListener('touchstart', (e) => {
            const t = e.touches;
            if (t.length === 1) {
                lastX = t[0].clientX;
                lastY = t[0].clientY;
                hasMoved = false;
                totalMoved = 0;
            } else if (t.length === 2) {
                lastY = (t[0].clientY + t[1].clientY) / 2;
                lastDist = Math.hypot(t[1].clientX - t[0].clientX, t[1].clientY - t[0].clientY);
                hasMoved = true;
            }
            e.preventDefault();
        }, { passive: false });

        trackpad.addEventListener('touchmove', (e) => {
            const t = e.touches;
            if (!rtc.inputChannel || rtc.inputChannel.readyState !== "open") return;

            if (t.length === 1 && !hasMoved) {
                const dx = t[0].clientX - lastX;
                const dy = t[0].clientY - lastY;
                totalMoved += Math.hypot(dx, dy);
                if (totalMoved > moveThreshold) {
                    rtc.sendInput({ type: 'move', dx, dy });
                    lastX = t[0].clientX;
                    lastY = t[0].clientY;
                }
            } else if (t.length === 2) {
                const currentY = (t[0].clientY + t[1].clientY) / 2;
                const currentDist = Math.hypot(t[1].clientX - t[0].clientX, t[1].clientY - t[0].clientY);

                const dy = currentY - lastY;
                const dd = currentDist - lastDist;

                if (Math.abs(dd) > Math.abs(dy) * 1.5) {
                    if (Math.abs(dd) > 1) rtc.sendInput({ type: 'zoom', delta: dd * 2 });
                } else if (Math.abs(dy) > 1) {
                    rtc.sendInput({ type: 'scroll', delta: dy * 2 });
                }

                lastY = currentY;
                lastDist = currentDist;
            } else if (t.length === 3) {
                statusLabel.innerText = "3-Finger Gesture";
            }
            e.preventDefault();
        }, { passive: false });

        trackpad.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                if (!totalMoved && !hasMoved) rtc.sendInput({ type: 'click' });
                setTimeout(() => { if (statusLabel.innerText.includes("Gesture")) statusLabel.innerText = "Connected"; }, 1000);
            }
        });

        document.body.addEventListener('click', () => { if (videoElem.paused) videoElem.play(); }, { once: true });
        rtc.init();
    </script>
</body>

</html>
