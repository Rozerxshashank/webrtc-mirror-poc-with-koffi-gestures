<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rein Mirror - Receiver</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="receiver-view">
    <div id="status">Wait...</div>

    <div id="remote-container">
        <video id="remoteVideo" autoplay muted playsinline></video>
    </div>

    <script src="WebRTCManager.js"></script>
    <script>
        const videoElem = document.getElementById('remoteVideo');
        const statusLabel = document.getElementById('status');
        const container = document.getElementById('remote-container');

        const roomId = "rein-gsoc-test";
        const rtc = new WebRTCManager('receiver', roomId, (stream) => {
            videoElem.srcObject = stream;
            videoElem.play().catch(() => {
                statusLabel.innerText = "Tap to Unmute/Play";
            });
            statusLabel.innerText = "Live";
        });

        rtc.onStatusUpdate = (msg) => { statusLabel.innerText = msg; };
        rtc.onConnectionStateChange = (state) => { statusLabel.innerText = state; };

        let lastX = 0, lastY = 0;
        let lastDist = 0;
        let hasMoved = false;
        let moveThreshold = 5;
        let totalMoved = 0;
        let touchCount = 0;

        container.addEventListener('touchstart', (e) => {
            touchCount = e.touches.length;
            if (touchCount === 1) {
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                hasMoved = false;
                totalMoved = 0;
            } else if (touchCount === 2) {
                lastY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                lastDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
                hasMoved = true;
            }
            e.preventDefault();
        }, { passive: false });

        let lastMoveTime = 0;
        container.addEventListener('touchmove', (e) => {
            const now = Date.now();
            if (now - lastMoveTime < 16) return; // ~60fps throttle
            lastMoveTime = now;

            const t = e.touches;
            if (!rtc.inputChannel || rtc.inputChannel.readyState !== "open") return;

            if (t.length === 1 && !hasMoved) {
                const dx = t[0].clientX - lastX;
                const dy = t[0].clientY - lastY;
                totalMoved += Math.hypot(dx, dy);
                if (totalMoved > moveThreshold) {
                    rtc.sendInput({ type: 'move', dx, dy });
                    lastX = t[0].clientX;
                    lastY = t[0].clientY;
                }
            } else if (t.length === 2) {
                const currentY = (t[0].clientY + t[1].clientY) / 2;
                const currentDist = Math.hypot(t[1].clientX - t[0].clientX, t[1].clientY - t[0].clientY);

                const dy = currentY - lastY;
                const dd = currentDist - lastDist;

                if (Math.abs(dd) > Math.abs(dy) * 1.2) {
                    if (Math.abs(dd) > 1) rtc.sendInput({ type: 'zoom', delta: dd * 1.5 });
                } else if (Math.abs(dy) > 1) {
                    rtc.sendInput({ type: 'scroll', delta: dy * 1.5 });
                }

                lastY = currentY;
                lastDist = currentDist;
            }
            e.preventDefault();
        }, { passive: false });

        container.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                if (!totalMoved && !hasMoved && touchCount === 1) {
                    rtc.sendInput({ type: 'click' });
                }
                touchCount = 0;
                hasMoved = false;
            }
        });

        document.body.addEventListener('click', () => { if (videoElem.paused) videoElem.play(); }, { once: true });
        rtc.init();
    </script>
</body>

</html>
